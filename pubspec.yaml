name: ductmaster_pro
description: "DuctMaster Pro - HVAC Calculation and Measurement App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Standard Icons & Fonts
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # App Launcher Icon Generator
  flutter_launcher_icons: ^0.13.1

# Launcher Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # Assets Folder Structure
  assets:
    - assets/
    - assets/icon/
